# The Main class path is expanded from Gradle's PACKAGE and NAME variables
main: $crimsonwarpedcraft.exampleplugin
name: JennyPlugin
version: "1.0.0"

# For modern servers, this must be "1.21" 
# (Major versions only are standard, e.g., 1.13, 1.20, 1.21)
api-version: "1.21.11"

author: secret
description:hehe

# It is best practice to list dependencies clearly
depend: [Citizens]

commands:
  jenny:
    description: Summon Jenny
    usage: "/<command>"
    aliases: [jspawn]
    permission: example.test
  ex:
    description: Base command for EXAMPLE
    usage: "/ex help"
    aliases: [example]

permissions:
  example.test:
    description: Allows you to use /jenny
    default: true
  example.*:
    description: Grants all example permissions
    default: op
    children:
      example.test: true
